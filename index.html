<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazim</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <div class="logo-icon">
                E
            </div>

            <div>
                <h2>Eazim</h2>
                <span>Business Suite</span>
            </div>

        </div>

        <nav>

            <a href="#" class="active">
                <i class="fa-solid fa-receipt"></i>
                Billing
            </a>

            <a href="#">
                <i class="fa-solid fa-users"></i>
                Customers
            </a>

            <a href="#">
                <i class="fa-solid fa-box"></i>
                Products
            </a>

            <a href="#">
                <i class="fa-solid fa-chart-line"></i>
                Analytics
            </a>

            <a href="#">
                <i class="fa-solid fa-gear"></i>
                Settings
            </a>

        </nav>

        <div class="sidebar-footer">

            <h4>Eazim v0.1</h4>

            <p>Simple. Fast. Smart.</p>

        </div>

    </aside>

    <!-- Main -->

    <main class="content">

        <!-- Header -->

        <header>

            <div>

                <h1>Billing</h1>

                <p>Create and manage invoices</p>

            </div>

            <div class="invoice-box">

                <small>Invoice</small>

                <h3 id="invoiceNo">
                    EZ-000001
                </h3>

                <span id="billDate"></span>

            </div>

        </header>

        <!-- Workspace -->

        <div class="workspace">

            <!-- Left -->

            <section class="left-panel">

                <!-- Customer -->

                <div class="card">

    <h3>Customer</h3>

    <div class="search-wrapper">

        <input
            id="customerSearch"
            type="text"
            placeholder="Search customer...">

        <div
            id="customerResults"
            class="results">
        </div>

    </div>

    <input
        id="phone"
        type="text"
        placeholder="Phone Number"
        readonly>

    <input
        id="place"
        type="text"
        placeholder="Place"
        readonly>

    <button
        id="newCustomerBtn"
        class="secondary">

        + Add Customer

    </button>

</div>

                <!-- Product -->

                <div class="card">

                    <h3>Product</h3>

                    <div class="search-wrapper">

                        <input
                            id="productSearch"
                            type="text"
                            placeholder="Search product...">

                        <div
                            id="productResults"
                            class="results">
                        </div>

                    </div>

                    <input
                        id="qty"
                        type="number"
                        placeholder="Quantity">

                    <button
                        id="addBtn"
                        class="primary">
                        Add Item
                    </button>

                </div>

            </section>

            <!-- Right -->

            <section class="right-panel">

    <div class="card">

        <div class="bill-header">

            <div>

                <h2>Current Bill</h2>

                <small id="billCustomer">

                    No Customer Selected

                </small>

            </div>

            <div>

                <span id="itemCount">

                    0 Items

                </span>

            </div>

        </div>

        <table>

            <thead>

                <tr>

                    <th>Product</th>

                    <th>Qty</th>

                    <th>Rate</th>

                    <th>Total</th>

                    <th></th>

                </tr>

            </thead>

            <tbody id="billBody">

            </tbody>

        </table>

        <div class="summary">

            <div class="summary-box">

                <span>Total Items</span>

                <h2 id="itemCount2">

                    0

                </h2>

            </div>

            <div class="summary-box">

                <span>Total Qty</span>

                <h2 id="totalQty">

                    0

                </h2>

            </div>

            <div class="summary-box">

                <span>Grand Total</span>

                <h1 id="grandTotal">

                    ₹0

                </h1>

            </div>

        </div>

        <div class="actions">

            <button
                id="newBill"
                class="dark">

                New Bill

            </button>

            <button
                id="saveBill"
                class="primary">

                Save Bill

            </button>

            <button
                id="shareBill"
                class="blue">

                Share

            </button>

        </div>

    </div>

</section>
        </div>

    </main>

</div>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
